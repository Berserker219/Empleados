{% extends 'base.html' %}

{% block title %}
    Eliminar Empleado
{% endblock title %}


{% block content %}
<section id="eliminar-empleado">
    
    <div class="header-modificar">
        <h1>Eliminar Empleado: {{ object.full_name }}</h1>
        <a href="javascript:history.back()" class="btn-regresar">
            <i class="fa-solid fa-circle-arrow-left"></i>
        </a>
    </div>

    <div class="confirmacion-container">
        <form method="POST" class="confirmacion-form"> {% csrf_token %}
            <div class="confirmacion-mensaje">
                <h5>¿Desea eliminar al empleado?</h5>
                <p>Confirme que desea eliminar a <strong>{{ object.full_name }}</strong>.</p>
            </div>
            <button type="submit" class="confirmar-button">Confirmar</button>
        </form>
    </div>
</section>

{% endblock content %}
