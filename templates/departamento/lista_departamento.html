{% extends 'base.html' %}

{% block content %}
<section id="lista-departamentos">
    <div class="title-container">
        <h1>Departamentos de la Empresa</h1>
        <a href="{% url 'departamento_app:nuevo_departamento' %}" class="add-icon" title="Agregar departamento">
        <i class="fas fa-building-circle-arrow-right"></i>
        </a>
    </div>
    <!-- Tabla de Departamentos -->
    <div class="table-container">
        <table class="departamentos-table">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Departamento</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for e in lista_depa %}
                <tr>
                    <td>{{ e.name }}</td>
                    <td>{{ e.shor_name }}</td>
                    <td>
                        <a href="{% url 'empleados_app:area_empleado' e.name %}" class="action-button view">Ver Empleados</a>
                        <a href="{% url 'departamento_app:borrar_departamento' e.id %}" class="action-button delete">Eliminar</a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" class="no-results">No hay departamentos registrados.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</section>
{% endblock content %}
